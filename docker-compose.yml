version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCOUNTS=${AWS_ACCOUNTS:-account1:111111111111,account2:222222222222}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-northeast-1}
      - DYNAMODB_TABLE_NAME=iam-audit-logs
      - DYNAMODB_ENDPOINT_URL=http://dynamodb-local:8000
      - SES_FROM_EMAIL=${SES_FROM_EMAIL:-noreply@example.com}
      - SES_TO_EMAILS=${SES_TO_EMAILS:-admin@example.com}
      - CORS_ORIGINS=http://localhost:5173
      # ローカル開発用のAWS認証情報
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - ./backend/app:/app/app
      - ~/.aws:/root/.aws:ro
    depends_on:
      - dynamodb-local
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    working_dir: /home/dynamodblocal

  # DynamoDB Localのテーブル作成
  dynamodb-init:
    image: amazon/aws-cli:latest
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-northeast-1
    depends_on:
      - dynamodb-local
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 3
        aws dynamodb create-table \
          --table-name iam-audit-logs \
          --attribute-definitions \
            AttributeName=operation_id,AttributeType=S \
            AttributeName=timestamp,AttributeType=S \
          --key-schema \
            AttributeName=operation_id,KeyType=HASH \
            AttributeName=timestamp,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 || true

networks:
  default:
    name: aws-iam-manager
